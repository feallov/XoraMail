services:
  - type: worker           # фоновый процесс (не веб-сервер)
    name: tempmail-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free             # или starter / standard
    envVars:
      - key: BOT_TOKEN
        sync: false        # вводится вручную в Render dashboard
      - key: ADMIN_IDS
        sync: false
      - key: STARS_PRICE_WEEK
        value: "15"
      - key: STARS_PRICE_PREMIUM
        value: "50"
      - key: REQUIRED_CHANNEL_ID
        sync: false
      - key: REQUIRED_CHANNEL_URL
        sync: false
      - key: MAIL_LIFETIME_FREE
        value: "15"
      - key: MAIL_LIFETIME_PREMIUM
        value: "30"
      - key: MAX_MAILS_FREE
        value: "2"
      - key: MAX_MAILS_PREMIUM
        value: "10"
      - key: MAIL_CHECK_INTERVAL
        value: "15"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./tempmail.db"
    disk:
      name: bot-data
      mountPath: /app
      sizeGB: 1
